    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="627" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://utkarshkumar-frontend.netlify.app/" />

    <title>Utkarsh Kumar - Senior Frontend & Mobile Engineer</title>

  <body>
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <textarea name="message"></textarea>
    </form>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="app-loader" style="position:fixed;inset:0;background:#050816;display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:20px;">
      <p style="color:white;font-family:sans-serif;font-size:28px;font-weight:700;letter-spacing:-0.5px;margin:0;">Utkarsh<span style="color:#22c55e;">.</span></p>
      <div style="width:40px;height:3px;background:#1f2937;border-radius:99px;overflow:hidden;">
        <div style="width:40%;height:100%;background:#22c55e;border-radius:99px;animation:slide 1s ease-in-out infinite alternate;"></div>
      </div>
      <style>@keyframes slide{from{transform:translateX(0)}to{transform:translateX(150%)}}</style>
    </div>
    <div id="root"></div>
